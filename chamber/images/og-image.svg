<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c7be5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a5ccc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grad)"/>
  
  <!-- Accent circles -->
  <circle cx="100" cy="100" r="80" fill="#ffffff" opacity="0.1"/>
  <circle cx="1100" cy="530" r="120" fill="#ffffff" opacity="0.1"/>
  
  <!-- Main content area -->
  <rect x="100" y="120" width="1000" height="390" fill="#ffffff" opacity="0.95" rx="15"/>
  
  <!-- Header section -->
  <text x="600" y="220" font-size="72" font-weight="bold" text-anchor="middle" fill="#2c7be5" font-family="Arial, sans-serif">
    KAMPALA CHAMBER
  </text>
  
  <!-- Subheader -->
  <text x="600" y="280" font-size="42" text-anchor="middle" fill="#1a2a3a" font-family="Arial, sans-serif">
    of Commerce
  </text>
  
  <!-- Tagline -->
  <text x="600" y="350" font-size="28" text-anchor="middle" fill="#495057" font-family="Arial, sans-serif">
    Business Directory & Networking
  </text>
  
  <!-- Bottom accent line -->
  <rect x="300" y="390" width="600" height="4" fill="#2c7be5" rx="2"/>
  
  <!-- Bottom text -->
  <text x="600" y="460" font-size="20" text-anchor="middle" fill="#6c757d" font-family="Arial, sans-serif">
    Connect with Kampala's Leading Businesses
  </text>
</svg>